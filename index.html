        // 다크모드 토글 기능
        function toggleTheme() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggle');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                toggleBtn.innerHTML = '🌙 다크모드';
            } else {
                body.setAttribute('data-theme', 'dark');
                toggleBtn.innerHTML = '☀️ 라이트모드';
            }
        }

        // 탭 전환 기능
        function showTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // 팝업(모달) 열기
        function openModal(id) {
            const data = noticeData[id];
            if(data) {
                document.getElementById('modalTitle').innerHTML = data.title;
                const cleanContent = data.content.replace(/^[ \t]+/gm, '').trim();
                document.getElementById('modalBody').innerHTML = cleanContent;
                document.getElementById('noticeModal').classList.add('show');
            }
        }

        // 팝업(모달) 닫기
        function closeModal() {
            document.getElementById('noticeModal').classList.remove('show');
        }

        // 모달 바깥 어두운 배경 클릭 시 닫기
        document.getElementById('noticeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
